<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lernquiz – Richtig oder Falsch</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #16181d;
      --muted: #687083;
      --border: #e4e7ef;
      --primary: #1f5eff;
      --primary-dark: #1647c7;
      --green-bg: #eaf8ef;
      --green: #137333;
      --red-bg: #fdeaea;
      --red: #b42318;
      --orange-bg: #fff4df;
      --orange: #8a5200;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ffffff 0, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .app { width: 100%; max-width: 850px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: clamp(26px, 4vw, 40px); letter-spacing: -0.04em; }
    .score { color: var(--muted); font-weight: 650; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 55px rgba(31, 39, 64, 0.10);
      padding: clamp(20px, 4vw, 34px);
    }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .pill {
      background: #f0f3fa;
      color: var(--muted);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 650;
    }
    .question-title { color: var(--muted); font-weight: 700; margin-bottom: 14px; }
    .statement { font-size: clamp(21px, 3vw, 30px); line-height: 1.25; font-weight: 750; margin: 0 0 24px; }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button {
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: 750;
      cursor: pointer;
      transition: transform .08s ease, background .12s ease, opacity .12s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: .65; transform: none; }
    .true-btn { background: #eaf8ef; color: var(--green); }
    .false-btn { background: #fdeaea; color: var(--red); }
    .next-btn, .reset-btn { background: var(--primary); color: white; width: 100%; margin-top: 14px; }
    .next-btn:hover, .reset-btn:hover { background: var(--primary-dark); }
    .feedback { display: none; margin-top: 20px; border-radius: 18px; padding: 16px; font-weight: 700; }
    .feedback.correct { display: block; background: var(--green-bg); color: var(--green); }
    .feedback.wrong { display: block; background: var(--red-bg); color: var(--red); }
    .correction {
      display: none;
      margin-top: 12px;
      background: var(--orange-bg);
      color: var(--orange);
      border: 1px solid #ffdf9a;
      border-radius: 18px;
      padding: 16px;
      line-height: 1.45;
    }
    .correction strong { display: block; margin-bottom: 6px; }
    .settings { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    select {
      flex: 1;
      min-width: 230px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 14px;
      padding: 12px;
      font-weight: 650;
      color: var(--text);
    }
    .small { color: var(--muted); font-size: 14px; margin-top: 14px; line-height: 1.4; }
    @media (max-width: 620px) { .buttons { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <h1>Lernquiz</h1>
      <div class="score" id="score">0 richtig · 0 falsch</div>
    </div>

    <section class="card">
      <div class="meta">
        <span class="pill" id="lsk">LSK</span>
        <span class="pill" id="counter">Frage</span>
      </div>
      <div class="question-title" id="questionTitle"></div>
      <p class="statement" id="statement"></p>

      <div class="buttons">
        <button class="true-btn" id="trueBtn">Richtig</button>
        <button class="false-btn" id="falseBtn">Falsch</button>
      </div>

      <div class="feedback" id="feedback"></div>
      <div class="correction" id="correction"></div>
      <button class="next-btn" id="nextBtn" style="display:none;">Nächste zufällige Aussage</button>
    </section>

    <div class="settings">
      <select id="filter"></select>
      <button class="reset-btn" id="resetBtn" style="max-width:220px; margin-top:0;">Score zurücksetzen</button>
    </div>
    <div class="small">Tipp: Du kannst die Fragen unten im Code im Bereich <strong>const questions</strong> ergänzen oder ändern.</div>
  </main>

  <script>
    const questions = [{"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 1: Welche Aussagen zur Unternehmensführung sind korrekt?", "aussage": "a. Die erste Aufgabe der Unternehmensführung besteht darin, Ziele zu setzen.", "richtig": false, "korrektur": "Die erste Aufgabe der Unternehmensführung ist die Koordination der Aktivitäten im Unternehmen, nicht primär die Zielsetzung."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 1: Welche Aussagen zur Unternehmensführung sind korrekt?", "aussage": "b. Aufgabe der Unternehmensführung ist es, die Aktivitäten im Unternehmen zu koordinieren.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 1: Welche Aussagen zur Unternehmensführung sind korrekt?", "aussage": "c. Unternehmensführung ist in großen Unternehmen arbeitsteilig organisiert.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 1: Welche Aussagen zur Unternehmensführung sind korrekt?", "aussage": "d. Gäbe es keine Interdependenzen zwischen den Aktivitäten in einem Unternehmen, wäre Koordination überflüssig.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 2: Welche Aussagen zum Controlling als betrieblicher Funktion sind korrekt?", "aussage": "a. Das Controlling übernimmt Führungsaufgaben.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 2: Welche Aussagen zum Controlling als betrieblicher Funktion sind korrekt?", "aussage": "b. Eine Aufgabe des Controllings besteht in der Koordination der Aktivitäten im Leistungssystem des Unternehmens.", "richtig": false, "korrektur": "Das Controlling koordiniert im Führungssystem des Unternehmens, nicht im Leistungssystem."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 2: Welche Aussagen zum Controlling als betrieblicher Funktion sind korrekt?", "aussage": "c. Das Controlling hat die Aufgabe, Informationsangebot und Informationsbedarf im Unternehmen aufeinander abzustimmen.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 2: Welche Aussagen zum Controlling als betrieblicher Funktion sind korrekt?", "aussage": "d. Es gibt keine Bereiche im Führungssystem eines Unternehmens, die nicht der Koordination bedürfen.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 3: Welche Aussagen zum Controlling als betrieblicher Funktion (Rationalität) sind korrekt?", "aussage": "a. Die Rationalität der Führung ist gewahrt, wenn die eingesetzten Mittel dem Zweck dienen.", "richtig": false, "korrektur": "Rationalität der Führung setzt voraus, dass Mittel und Zwecke im Einklang stehen und auch eine kritische Reflexion stattfindet – allein die Zweckdienlichkeit genügt nicht."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 3: Welche Aussagen zum Controlling als betrieblicher Funktion (Rationalität) sind korrekt?", "aussage": "b. Ohne Reflektion kommt eine rationale Unternehmensführung nicht aus.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 3: Welche Aussagen zum Controlling als betrieblicher Funktion (Rationalität) sind korrekt?", "aussage": "c. Rationalitätsorientierte Controllingauffassungen sehen die Delegation von Entscheidungskompetenzen an das Controlling vor.", "richtig": false, "korrektur": "Rationalitätsorientierte Controllingauffassungen sehen keine Delegation von Entscheidungskompetenzen an das Controlling vor; das Controlling unterstützt die Führung, trifft aber keine Entscheidungen."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 3: Welche Aussagen zum Controlling als betrieblicher Funktion (Rationalität) sind korrekt?", "aussage": "d. Koordinations- und rationalitätsorientierte Controllingauffassungen stehen in einem gewissen Widerspruch zueinander.", "richtig": false, "korrektur": "Koordinations- und rationalitätsorientierte Controllingauffassungen ergänzen sich und stehen nicht im Widerspruch zueinander."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 4: Welche Aussagen zum Controlling als betrieblicher Institution sind korrekt?", "aussage": "a. Es gibt Unternehmen ohne Controllingabteilung, aber es gibt kein Unternehmen ohne Controlling.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 4: Welche Aussagen zum Controlling als betrieblicher Institution sind korrekt?", "aussage": "b. Das zentrale Controlling ist regelmäßig dem Vorstandssprecher zugeordnet.", "richtig": false, "korrektur": "Das zentrale Controlling ist regelmäßig dem CFO (Finanzvorstand) zugeordnet, nicht dem Vorstandssprecher."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 4: Welche Aussagen zum Controlling als betrieblicher Institution sind korrekt?", "aussage": "c. In großen Unternehmen ist neben dem zentralen Controlling regelmäßig auch ein dezentrales Controlling anzutreffen.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 4: Welche Aussagen zum Controlling als betrieblicher Institution sind korrekt?", "aussage": "d. Das Dotted-Line-Prinzip sieht die fachliche Unterstellung eines dezentralen Controllings unter den jeweiligen Fachbereich vor.", "richtig": false, "korrektur": "Das Dotted-Line-Prinzip sieht die fachliche Unterstellung des dezentralen Controllings unter das zentrale Controlling vor, nicht unter den jeweiligen Fachbereich."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 5: Welche Aussagen zu den Rahmenbedingungen des Controllings sind korrekt?", "aussage": "a. Die Vorgaben der Unternehmensleitung sind für den Controller ein Datum.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 5: Welche Aussagen zu den Rahmenbedingungen des Controllings sind korrekt?", "aussage": "b. Bewegt sich ein Unternehmen innerhalb der Rechtsordnung, wird es seinen moralischen Verpflichtungen automatisch gerecht.", "richtig": false, "korrektur": "Rechtliche und moralische Verpflichtungen sind nicht deckungsgleich; ein rechtlich konformes Verhalten erfüllt nicht automatisch alle moralischen Ansprüche."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 5: Welche Aussagen zu den Rahmenbedingungen des Controllings sind korrekt?", "aussage": "c. Moralische Verpflichtungen sind rechtlichen Verpflichtungen nachgeordnet.", "richtig": false, "korrektur": "Moralische Verpflichtungen sind rechtlichen Verpflichtungen nicht nachgeordnet; beide stehen gleichberechtigt nebeneinander und können über das rechtlich Geforderte hinausgehen."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 5: Welche Aussagen zu den Rahmenbedingungen des Controllings sind korrekt?", "aussage": "d. Die Organisation des Unternehmens ist von dem Controlling nicht zu hinterfragen.", "richtig": false, "korrektur": "Das Controlling kann und sollte auch organisatorische Strukturen hinterfragen, sofern dies zur Rationalitätssicherung der Unternehmensführung beiträgt."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 6: Welche Aussagen zum entscheidungsorientierten Controlling sind korrekt?", "aussage": "a. Das entscheidungsorientierte Controlling geht von altruistischen Entscheidungsträgern im Unternehmen aus.", "richtig": false, "korrektur": "Das entscheidungsorientierte Controlling geht nicht von altruistischen, sondern von eigennutzorientierten Entscheidungsträgern aus."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 6: Welche Aussagen zum entscheidungsorientierten Controlling sind korrekt?", "aussage": "b. Das entscheidungsorientierte Controlling bezieht sich auf Planung und Entscheidung, nicht aber auf Kontrolle und Informationsversorgung.", "richtig": false, "korrektur": "Das entscheidungsorientierte Controlling umfasst Planung, Entscheidung, Kontrolle und Informationsversorgung."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 6: Welche Aussagen zum entscheidungsorientierten Controlling sind korrekt?", "aussage": "c. Ein Gegenstand des entscheidungsorientierten Controllings ist die Abstimmung von kurz- und langfristiger Planung.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 6: Welche Aussagen zum entscheidungsorientierten Controlling sind korrekt?", "aussage": "d. Beim entscheidungsorientierten Controlling geht es um die Zielsetzung des Unternehmens.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 7: Welche Aussagen zum verhaltensorientierten Controlling sind korrekt?", "aussage": "a. Das verhaltensorientierte Controlling geht von egoistischen Entscheidungsträgern im Unternehmen aus.", "richtig": false, "korrektur": "Das verhaltensorientierte Controlling geht zwar von eigeninteressierten, aber nicht zwingend rein egoistischen Entscheidungsträgern aus; die Annahme ist vielmehr, dass Mitarbeiter ihre eigenen Interessen verfolgen können."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 7: Welche Aussagen zum verhaltensorientierten Controlling sind korrekt?", "aussage": "b. Beim verhaltensorientierten Controlling geht es um die Beeinflussung der Entscheidungsprozesse der Mitarbeiter.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 7: Welche Aussagen zum verhaltensorientierten Controlling sind korrekt?", "aussage": "c. Die Nutzung von Informationen ist annahmegemäß Gegenstand des Entscheidungskalküls von Mitarbeitern.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 7: Welche Aussagen zum verhaltensorientierten Controlling sind korrekt?", "aussage": "d. Das verhaltensorientierte Controlling bezieht sich auf das Personalführungssystem, nicht aber auf das Planungssystem.", "richtig": false, "korrektur": "Das verhaltensorientierte Controlling bezieht sich sowohl auf das Personalführungssystem als auch auf das Planungssystem."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 8: Welche Aussagen zum wertorientierten Controlling sind korrekt?", "aussage": "a. Beim wertorientierten Controlling geht es letztlich um die Erhöhung des Marktwertes des Unternehmens insgesamt.", "richtig": false, "korrektur": "Beim wertorientierten Controlling geht es um die Erhöhung des Marktwerts des Eigenkapitals, nicht des Unternehmens insgesamt."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 8: Welche Aussagen zum wertorientierten Controlling sind korrekt?", "aussage": "b. Die Interessen der Arbeitnehmer spielen bei einer wertorientierten Unternehmensführung allenfalls indirekt eine Rolle.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 8: Welche Aussagen zum wertorientierten Controlling sind korrekt?", "aussage": "c. Der Marktwert des Eigenkapitals steigt, wenn sich das eingebrachte Eigenkapital mit dem Eigenkapitalkostensatz verzinst.", "richtig": false, "korrektur": "Der Marktwert des Eigenkapitals steigt nur, wenn die Eigenkapitalrendite den Eigenkapitalkostensatz übersteigt (positive Überrendite), nicht wenn er nur dem Kostensatz entspricht."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 8: Welche Aussagen zum wertorientierten Controlling sind korrekt?", "aussage": "d. Das wertorientierte Controlling stellt in gewisser Weise eine Spielart des entscheidungsorientierten Controllings dar.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 9: Welche Aussagen zu den Instrumenten des Controllings sind korrekt?", "aussage": "a. Planung, Informationsversorgung und Kontrolle sind Aufgaben des Controllings.", "richtig": false, "korrektur": "Planung, Informationsversorgung und Kontrolle sind zwar Instrumente des Controllings, aber keine originären Controlling-Aufgaben – die Aufgabe des Controllings ist die Koordination dieser Instrumente."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 9: Welche Aussagen zu den Instrumenten des Controllings sind korrekt?", "aussage": "b. Leistungsmaße dienen in erster Linie der Feststellung des wirtschaftlichen Erfolgs von Geschäftsbereichen.", "richtig": false, "korrektur": "Leistungsmaße dienen primär der Verhaltenssteuerung und Koordination, nicht allein der Erfolgsermittlung."}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 9: Welche Aussagen zu den Instrumenten des Controllings sind korrekt?", "aussage": "c. Budgetierung und Verrechnungspreise sind alternative Koordinationsinstrumente.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 9: Welche Aussagen zu den Instrumenten des Controllings sind korrekt?", "aussage": "d. Kennzahlen können als Leistungsmaße Verwendung finden.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 1 – Bewertung: 4.70 / 10.00 (47%)", "frage": "Frage 10: Welche Aussagen zu den Instrumenten des Controllings (II) sind korrekt?", "aussage": "a. Die Kostenrechnung ist ein Teilbereich des Controllings.", "richtig": false, "korrektur": "Die m jeweiligen Kontext ab."}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 3: Welche Aussagen zu Präferenzen sind korrekt?", "aussage": "a. Die Artenpräferenz bezieht sich auf mehrere Ziele, die notwendigerweise in Konkurrenz zueinanderstehen.", "richtig": false, "korrektur": "Die Artenpräferenz gibt an, welche Zielarten (z. B. monetäre vs. nicht-monetäre Ziele) dem Entscheider wichtig sind; diese müssen nicht notwendigerweise in Konkurrenz stehen."}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 3: Welche Aussagen zu Präferenzen sind korrekt?", "aussage": "b. Die Höhenpräferenz in Bezug auf monetäre Ergebnisse ist meist monoton steigend.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 3: Welche Aussagen zu Präferenzen sind korrekt?", "aussage": "c. Über die Zeitpräferenz wird die Gegenwartsorientierung des Entscheiders abgebildet.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 3: Welche Aussagen zu Präferenzen sind korrekt?", "aussage": "d. Risikopräferenzen werden im Wege der Bestimmung subjektiver Wahrscheinlichkeiten berücksichtigt.", "richtig": false, "korrektur": "Risikopräferenzen werden durch die Form der Nutzenfunktion (z. B. konkav bei Risikoaversion) abgebildet, nicht durch subjektive Wahrscheinlichkeiten."}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 4: Welche Aussagen zu intertemporalen Entscheidungsproblemen sind korrekt?", "aussage": "a. Eine Abzinsung kann als Ausdruck einer Präferenz für künftige Ergebnisse interpretiert werden.", "richtig": false, "korrektur": "Eine Abzinsung ist Ausdruck einer Präferenz für gegenwärtige Ergebnisse (Gegenwartspräferenz), nicht für künftige."}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 4: Welche Aussagen zu int t?", "aussage": "c. Ein risikoscheuer Entscheidungsträger ist bereit, eine Risikoprämie zu zahlen, um das Sicherheitsäquivalent zu erhalten.", "richtig": false, "korrektur": "Ein risikoscheuer Entscheidungsträger akzeptiert ein Sicherheitsäquivalent, das kleiner als der Erwartungswert ist – er zahlt also implizit eine Risikoprämie, um Unsicherheit zu vermeiden."}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 5: Welche Aussagen zu Entscheidungen bei Risiko sind korrekt?", "aussage": "d. Bei dem Erwartungswertprinzip werden die möglichen Ergebnisse mit subjektiven Wahrscheinlichkeiten gewichtet.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 6: Welche Aussagen zur Erwartungsnutzentheorie sind korrekt?", "aussage": "a. Die Nutzenfunktion nach der Erwartungsnutzentheorie bildet sowohl die Höhenpräferenz als auch die Risikopräferenz ab.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 6: Welche Aussagen zur Erwartungsnutzentheorie sind korrekt?", "aussage": "b. Die Risikoeinstellung des Entscheidungsträgers spiegelt sich in der Steigung der Nutzenfunktion wider.", "richtig": false, "korrektur": "Die Risikoeinstellung spiegelt sich in der Krümmung (Konkavität/Konvexität) der Nutzenfunktion wider, nicht in ihrer Steigung."}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 6: Welche Aussagen zur Erwartungsnutzentheorie sind korrekt?", "aussage": "c. Die Erwartungsnutzentheorie impliziert das µ-s²-Prinzip.", "richtig": false, "korrektur": "Die Erwartungsnutzentheorie impliziert nicht generell das µ-s²-Prinzip; dieses gilt nur unter speziellen Voraussetzungen (z. B. normalverteilte Ergebnisse oder quadratische Nutzenfunktion)."}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 6: Welche Aussagen zur Erwartungsnutzentheorie sind korrekt?", "aussage": "d. Ein überproportionaler Anstieg der Nutzenfunktion steht für einen risikofreudigen Entscheidungsträger.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 7: Welche Aussagen zu Entscheidungen bei mehrfacher Zielsetzung sind korrekt?", "aussage": "a. In Bezug auf die Erreichung jedes Ziels muss genau ein Ergebnis formuliert werden.", "richtig": false, "korrektur": "Für jedes Ziel kann es mehrere mögliche Ergebnisausprägungen geben; es muss nicht genau ein Ergebnis festgelegt werden."}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 7: Welche Aussagen zu Entscheidungen bei mehrfacher Zielsetzung sind korrekt?", "aussage": "b. Eine Artenpräferenz ist für die Lösung von multikriteriellen Entscheidungsproblemen nicht immer erforderlich.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 7: Welche Aussagen zu Entscheidungen bei mehrfacher Zielsetzung sind korrekt?", "aussage": "c. Bei mehreren Zielen lassen sich die Präferenzen eines Entscheidungsträgers ggf. durch additive Wertfunktionen abbilden.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 7: Welche Aussagen zu Entscheidungen bei mehrfacher Zielsetzung sind korrekt?", "aussage": "d. Entscheidungen bei mehrfacher Zielsetzung lassen sich immer auf Entscheidungen bei einfacher Zielsetzung zurückführen.", "richtig": false, "korrektur": "Entscheidungen bei mehrfacher Zielsetzung lassen sich nicht immer auf einfache Zielsetzungen reduzieren; dies erfordert bestimmte Voraussetzungen wie die Präferenzunabhängigkeit der Ziele."}, {"lsk": "Lernstandskontrolle 2a – Bewertung: 3.17 / 10.00 (31.67%)", "frage": "Frage 8: Welche Aussagen zu additiven Wertfunktionen sind korrekt?", "aussage": "a. Additive Wertfunktionen können nur angewendet werden ": "Frage 7: Welche Aussagen zum freien Cashflow sind korrekt?", "aussage": "d. Der freie Cashflow entspricht dem NOPLAT zuzüglich der nicht zahlungswirksamen Aufwendungen.", "richtig": false, "korrektur": "Der freie Cashflow ergibt sich aus dem NOPLAT zuzüglich nicht zahlungswirksamer Aufwendungen abzüglich Investitionen in das Working Capital und in das Anlagevermögen."}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 8: Welche Aussagen zu Kapitalkostensätzen sind korrekt?", "aussage": "a. Der Eigenkapitalkostensatz entspricht dem risikolosen Zinssatz abzüglich einer Risikoprämie.", "richtig": false, "korrektur": "Der Eigenkapitalkostensatz entspricht dem risikolosen Zinssatz zuzüglich (nicht abzüglich) einer Risikoprämie."}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 8: Welche Aussagen zu Kapitalkostensätzen sind korrekt?", "aussage": "b. Der durchschnittliche Kapitalkostensatz beim Total Cashflow Verfahren ist größer als der beim Free Cashflow Verfahren.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 8: Welche Aussagen zu Kapitalkostensätzen sind korrekt?", "aussage": "c. Der Fremdkapitalzinssatz enthält einen Ausgleich für das vom Fremdkapitalgeber übernommene Ausfallrisiko.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 8: Welche Aussagen zu Kapitalkostensätzen sind korrekt?", "aussage": "d. Der WACC beim Total Cashflow Verfahren berücksichtigt den Tax Shield der Fremdfinanzierung.", "richtig": false, "korrektur": "Beim Total Cashflow Verfahren wird der Tax Shield im Cashflow berücksichtigt, nicht im WACC; beim Free Cashflow Verfahren hingegen wird der Tax Shield im WACC abgebildet."}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 9: Welche Aussagen zum Theorem von Preinreich und Lücke sind korrekt?", "aussage": "a. Das Kongruenzprinzip folgt aus dem Clean Surplus Accounting für KB0 = KBT = 0.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 9: Welche Aussagen zum Theorem von Preinreich und Lücke sind korrekt?", "aussage": "b. Der Kapitalwert von Periodengewinnen ist gleich dem Kapitalwert von Einzahlungsüberschüssen.", "richtig": false, "korrektur": "Das Theorem besagt, dass der Kapitalwert der Residualgewinne (Übergewinne) gleich dem Kapitalwert der Einzahlungsüberschüsse ist – nicht der Periodengewinne selbst."}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 9: Welche Aussagen zum Theorem von Preinreich und Lücke sind korrekt?", "aussage": "c. Voraussetzung ist die Anwendung des linearen Abschreibungsverfahrens.", "richtig": false, "korrektur": "Das Theorem gilt unabhängig von der Abschreibungsmethode, solange das Kongruenzprinzip eingehalten wird."}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 9: Welche Aussagen zum Theorem von Preinreich und Lücke sind korrekt?", "aussage": "d. Das Theorem kann ggf. für die Bestimmung von Marktwertbeiträgen genutzt werden.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 10: Welche Aussagen zu Marktwertbeiträgen sind korrekt?", "aussage": "a. Die Summe der Stand-Alone Marktwerte zweier Unternehmen ist ggf. kleiner als der Marktwert des Unternehmensverbunds.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 10: Welche Aussagen zu Marktwertbeiträgen sind korrekt?", "aussage": "b. Marktwertbeiträge werden mittels des Kapitalwertkalküls berechnet.", "richtig": true, "korrektur": ""}, {"lsk": "Lernstandskontrolle 2b – Bewertung: 5.87 / 10.00 (58.67%)", "frage": "Frage 10: Welche Aussagen zu Marktwertbeiträgen sind korrekt?", "aussa     function uniqueLskNames() {
      return [...new Set(questions.map(q => q.lsk.replace(/ – Bewertung:.*/, '')))];
    }

    function setupFilter() {
      filterEl.innerHTML = '<option value="alle">Alle Lernstandskontrollen</option>' +
        uniqueLskNames().map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('');
    }

    function getFilteredQuestions() {
      const selected = filterEl.value;
      if (selected === 'alle') return questions;
      return questions.filter(q => q.lsk.startsWith(selected));
    }

    function randomQuestion() {
      const pool = getFilteredQuestions();
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function showQuestion() {
      currentQuestion = randomQuestion();
      askedCount++;
      lskEl.textContent = currentQuestion.lsk.replace(/ – Bewertung:.*/, '');
      counterEl.textContent = `Aussage ${askedCount}`;
      questionTitleEl.textContent = currentQuestion.frage;
      statementEl.textContent = currentQuestion.aussage;
      feedbackEl.className = 'feedback';
      feedbackEl.textContent = '';
      correctionEl.style.display = 'none';
      correctionEl.innerHTML = '';

      falseBtn.disabled = false;
      nextBtn.style.display = 'none';
    }

    function answer(userSaysTrue) {

        feedbackEl.className = 'feedback wrong';
        feedbackEl.textContent = `Leider falsch. Die Aussage ist ${currentQuestion.richtig ? 'richtig' : 'falsch'}.`;
      }

      // Wichtig: Wenn die Aussage selbst falsch ist, wird die Verbesserung immer eingeblendet.
      if (!currentQuestion.richtig && currentQuestion.korrektur) {
        correctionEl.style.display = 'block';
        correctionEl.innerHTML = `<strong>Verbesserung:</strong>${escapeHtml(currentQuestion.korrektur)}`;
      }

      trueBtn.disabled = true;
      falseBtn.disabled = true;
      nextBtn.style.display = 'block';
      updateScore();
    }

    function updateScore() {
      scoreEl.textContent = `${correctCount} richtig · ${wrongCount} falsch`;
    }

    function resetScore() {
      askedCount = 0;
      correctCount = 0;
      wrongCount = 0;
      updateScore();
      showQuestion();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    trueBtn.addEventListener('click', () => answer(true));
    falseBtn.addEventListener('click', () => answer(false));
    nextBtn.addEventListener('click', showQuestion);
    resetBtn.addEventListener('click', resetScore);
    filterEl.addEventListener('change', resetScore);

    setupFilter();
    showQuestion();
  </script>
</body>
</html>
